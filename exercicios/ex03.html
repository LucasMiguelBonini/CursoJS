<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex03</title>
    <style>
        body{
            font: 10pt arial;
        }
        button {
            font-size: 20px;
            padding: 30px;
        }
    </style>
</head>
<body>
    <h1>Clique no botão para começar</h1>
    <button onclick="botao()"><strong>Começar</strong>
    </button>
    <script>
        function botao(){
            var nome = window.prompt("Qual é o seu nome ?")
            window.alert(`Seja bem vindo ${nome}!`)
        }
    </script>
</body>
</html>
