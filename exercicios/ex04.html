<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex04</title>
    <style>
        body {
            font: normal 12pt Arial;
        }
        button {
            font-size: 20pt;
            width: 200px;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Clique no botão para começar</h1>
    <button onclick="botao()"><strong>Botão</strong></button>
    <section id="resultado">Resultado Aqui</section>
    <script>
        function botao() {
            let nome = window.prompt("Qual é o seu nome?")
            let resultado = document.getElementById('resultado')
            resultado.innerHTML = `Olá, <strong>${nome}</strong>! É um grande prazer te conhecer!`
        }
    </script>
</body>
</html>
