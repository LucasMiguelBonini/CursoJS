<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex05</title>
    <style>
        body {
            font: 12pt Arial;
        }
        button {
            font-size: 15pt;
            padding: 30px;
            width: 300px;
        }
    </style>
</head>
<body>
    <h1>Vamos trabalhar com números</h1>
    <button onclick="calcular()"><strong>Clique para calcular</strong></button>
    <section id="resultado">
        <p>O resultado vai aparecer aqui...</p>
    </section>
    <script>
        window.alert("Seja bem-vindo(a) ao meu site!")

        function calcular() {
            let n1 = window.prompt("Digite um número:")
            let resultado = window.document.querySelector('section#resultado')

            resultado.innerHTML = `<p>O dobro de ${n1} é ${n1 * 2} e a metade é ${n1 / 2}!</p>`
        }
    </script>
</body>
</html>
